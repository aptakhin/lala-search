<!DOCTYPE html>
<html lang="en">
<head>
    <!--#include virtual="/includes/head.html" -->
    <title>Dashboard - LalaSearch</title>
    <script defer src="/js/dashboard.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="dashboardPage()" x-init="init()">
    <!--#include virtual="/includes/header.html" -->

    <!-- Loading state -->
    <div class="container" x-show="!ready">
        <div class="loading" style="margin-top: 40px;">
            <span class="spinner"></span> Loading dashboard...
        </div>
    </div>

    <!-- Dashboard content (only when authenticated) -->
    <div class="container" x-show="ready && user" x-cloak>

        <!-- User Info Bar -->
        <div class="dashboard-header">
            <div class="user-info">
                <span>Signed in as: <strong data-testid="dashboard-user-email" x-text="user?.email"></strong></span>
                <span x-show="currentOrg">
                    | Role: <strong data-testid="dashboard-user-role" x-text="currentOrg?.role"></strong>
                </span>
            </div>
            <button @click="signOut()" data-testid="signout-button">SIGN OUT</button>
        </div>

        <!-- Org Switcher (only when user belongs to multiple organizations) -->
        <div x-show="hasMultipleOrgs" class="dashboard-section" style="padding: 8px 12px;" data-testid="org-switcher">
            <label style="font-weight: bold; margin-right: 8px;">Organization:</label>
            <select
                @change="switchOrg(user.organizations[$event.target.selectedIndex])"
                data-testid="org-switcher-select"
                style="min-width: 200px;"
            >
                <template x-for="org in user?.organizations" :key="org.tenant_id">
                    <option :value="org.tenant_id" :selected="org.tenant_id === tenantId" x-text="org.name || org.tenant_id"></option>
                </template>
            </select>
        </div>

        <!-- Tenant-Scoped Search -->
        <div x-data="dashboardSearch()" @org-switched.window="clearSearch()" class="dashboard-section" data-testid="dashboard-search">
            <h3>Search</h3>
            <div class="inline-form search-inline-form">
                <textarea
                    x-model="query"
                    @keydown="onQueryKeydown($event)"
                    placeholder="Search within this organization..."
                    data-testid="dashboard-search-input"
                    style="flex: 1;"
                ></textarea>
                <button @click="search()" :disabled="isLoading" data-testid="dashboard-search-button">
                    <span x-show="!isLoading">SEARCH</span>
                    <span x-show="isLoading"><span class="spinner"></span></span>
                </button>
                <button x-show="hasSearched" @click="clearSearch()" data-testid="dashboard-search-clear">CLEAR</button>
                <div class="search-shortcut-hint" x-text="searchShortcutHint"></div>
            </div>

            <div x-show="error" class="msg-error" @click="error = null" style="cursor: pointer;" x-text="error"></div>

            <div x-show="hasSearched && !isLoading">
                <div x-show="totalResults > 0" style="margin-top: 10px; font-size: 12px; color: #666;">
                    Found <span x-text="totalResults"></span>
                    <span x-show="totalResults === 1">result</span>
                    <span x-show="totalResults !== 1">results</span>
                </div>
                <div x-show="totalResults === 0" style="margin-top: 10px;">
                    <strong>No results found.</strong>
                </div>
            </div>

            <template x-for="(result, index) in results" :key="index">
                <div class="search-result" style="margin-top: 10px; padding: 8px; border: 1px solid #cccccc; background: #ffffff;">
                    <div style="font-weight: bold; cursor: pointer; color: #000066;" @click="openUrl(result.document.url)">
                        <span x-show="result.document.title" x-text="result.document.title"></span>
                        <span x-show="!result.document.title">[No Title]</span>
                    </div>
                    <div style="font-size: 11px; color: #006600;" x-text="result.document.url"></div>
                    <div style="font-size: 12px; margin-top: 4px;" x-html="result.snippet || result.document.excerpt"></div>
                </div>
            </template>

            <div x-show="!isLoading && totalResults > limit" style="margin-top: 10px; text-align: center;">
                <button @click="previousPage()" :disabled="currentOffset === 0">PREVIOUS</button>
                <span style="margin: 0 10px; font-weight: bold;">
                    Page <span x-text="Math.floor(currentOffset / limit) + 1"></span> of <span x-text="Math.ceil(totalResults / limit)"></span>
                </span>
                <button @click="nextPage()" :disabled="currentOffset + limit >= totalResults">NEXT</button>
            </div>
        </div>

        <!-- Organization Name (owner only) -->
        <div x-show="isOwner" class="dashboard-section" data-testid="tenant-name-section">
            <h3>Organization Name</h3>
            <div class="inline-form">
                <input
                    type="text"
                    x-model="tenantNameValue"
                    @input="onTenantNameInput()"
                    placeholder="Enter your organization name..."
                    data-testid="tenant-name-input"
                    style="flex: 1;"
                >
                <span x-show="tenantNameSaving" style="color: #666666; font-size: 12px;">
                    <span class="spinner" style="width: 14px; height: 14px; border-width: 2px;"></span>
                </span>
                <span x-show="tenantNameSaved && !tenantNameSaving" style="color: #006600; font-size: 14px; font-weight: bold;" x-cloak>
                    &#10003;
                </span>
            </div>
        </div>

        <!-- Undo / Redo Bar -->
        <div x-show="undoable || redoable" class="undo-redo-bar" data-testid="undo-redo-bar">
            <button
                @click="undo()"
                :disabled="!undoable || undoing"
                class="btn-undo"
                data-testid="undo-button"
            >UNDO</button>
            <button
                @click="redo()"
                :disabled="!redoable || redoing"
                class="btn-redo"
                data-testid="redo-button"
            >REDO</button>
            <span class="undo-redo-desc" x-text="undoable?.description || redoable?.description || ''"></span>
        </div>
        <div x-show="actionMessage" class="msg-success" @click="actionMessage = null" style="cursor: pointer;" data-testid="action-message" x-text="actionMessage"></div>

        <!-- Invite Users Section (owners/admins only) -->
        <div x-show="canManage" x-data="inviteSection()" x-init="loadMembers()" @action-rolled-back.window="loadMembers()" @org-switched.window="loadMembers()" class="dashboard-section">
            <h3>Invite Users</h3>

            <div class="inline-form">
                <input
                    type="email"
                    x-model="inviteEmail"
                    @keydown.enter="invite()"
                    placeholder="user@example.com"
                    data-testid="invite-email-input"
                >
                <select x-model="inviteRole" data-testid="invite-role-select">
                    <option value="member">Member</option>
                    <option value="admin">Admin</option>
                </select>
                <button @click="invite()" :disabled="inviting" data-testid="invite-submit-button">
                    <span x-show="!inviting">INVITE</span>
                    <span x-show="inviting"><span class="spinner"></span></span>
                </button>
            </div>

            <div x-show="inviteMessage" class="msg-success" data-testid="invite-success-message" x-text="inviteMessage"></div>
            <div x-show="inviteError" class="msg-error" @click="inviteError = null" style="cursor: pointer;" data-testid="invite-error-message" x-text="inviteError"></div>

            <!-- Members Table -->
            <div x-show="members.length > 0" style="margin-top: 15px;">
                <strong style="color: #000066;">Current Members</strong>
                <table class="data-table" data-testid="members-table">
                    <thead>
                        <tr>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Joined</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="member in members" :key="member.user_id">
                            <tr>
                                <td x-text="member.email"></td>
                                <td x-text="member.role"></td>
                                <td x-text="formatDate(member.joined_at)"></td>
                                <td>
                                    <button
                                        x-show="member.user_id !== $data.user?.user_id"
                                        @click="removeMember(member.user_id)"
                                        class="btn-delete"
                                        data-testid="remove-member-button"
                                    >Remove</button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
            <div x-show="membersLoading" class="loading" style="margin-top: 10px;">
                <span class="spinner"></span> Loading members...
            </div>
        </div>

        <!-- Allowed Domains Section (owners/admins only) -->
        <div x-show="canManage" x-data="domainsSection()" x-init="loadDomains()" @action-rolled-back.window="loadDomains()" @org-switched.window="loadDomains()" class="dashboard-section">
            <h3>Allowed Domains</h3>

            <div class="inline-form">
                <input
                    type="text"
                    x-model="newDomain"
                    @keydown.enter="addDomain()"
                    placeholder="example.com"
                    data-testid="domain-input"
                >
                <input
                    type="text"
                    x-model="domainNotes"
                    placeholder="Notes (optional)"
                    style="min-width: 120px;"
                    data-testid="domain-notes-input"
                >
                <button @click="addDomain()" :disabled="adding" data-testid="add-domain-button">
                    <span x-show="!adding">ADD DOMAIN</span>
                    <span x-show="adding"><span class="spinner"></span></span>
                </button>
            </div>

            <div x-show="domainMessage" class="msg-success" data-testid="domain-success-message" x-text="domainMessage"></div>
            <div x-show="domainError" class="msg-error" @click="domainError = null" style="cursor: pointer;" data-testid="domain-error-message" x-text="domainError"></div>

            <!-- Domains Table -->
            <div x-show="domains.length > 0" style="margin-top: 15px;">
                <strong style="color: #000066;">Allowed Domains List</strong>
                <table class="data-table" data-testid="domains-table">
                    <thead>
                        <tr>
                            <th>Domain</th>
                            <th>Added By</th>
                            <th>Notes</th>
                            <th>Added</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="domain in domains" :key="domain.domain">
                            <tr>
                                <td x-text="domain.domain"></td>
                                <td x-text="domain.added_by"></td>
                                <td x-text="domain.notes || '—'"></td>
                                <td x-text="formatDate(domain.added_at)"></td>
                                <td>
                                    <button
                                        @click="deleteDomain(domain.domain)"
                                        class="btn-delete"
                                        data-testid="delete-domain-button"
                                    >Delete</button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
            <div x-show="domainsLoading" class="loading" style="margin-top: 10px;">
                <span class="spinner"></span> Loading domains...
            </div>
        </div>

    </div>

    <!--#include virtual="/includes/footer.html" -->

</body>
</html>
