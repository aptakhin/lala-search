# Docker Compose Override for E2E Testing
# Usage: docker compose -f docker-compose.yml -f docker-compose.test.yml up

services:
  mailpit:
    image: axllent/mailpit:v1.28.2
    container_name: lalasearch-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8025/api/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - lalasearch-network

  # Override agent with test environment
  lala-agent:
    environment:
      # Use test-specific Meilisearch index to avoid interfering with development data
      - MEILISEARCH_INDEX=documents_test
      # Mark as test agent in user agent string
      - USER_AGENT=LalaSearchBot/0.1 (E2E-Test)
      # Deployment mode: single_tenant by default; set DEPLOYMENT_MODE=multi_tenant
      # in the environment to run the multi-tenant test phase
      - DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-single_tenant}
      # Route test emails to Mailpit only when the runner enables SMTP for that phase.
      - SMTP_HOST=${E2E_SMTP_HOST:-}
      - SMTP_PORT=${E2E_SMTP_PORT:-1025}
      - SMTP_USERNAME=${E2E_SMTP_USERNAME:-}
      - SMTP_PASSWORD=${E2E_SMTP_PASSWORD:-}
      - SMTP_TLS=${E2E_SMTP_TLS:-false}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@test.e2e}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:3000}
      - MAGIC_LINK_PERMANENT_BLOCK_AFTER_ATTEMPTS=${MAGIC_LINK_PERMANENT_BLOCK_AFTER_ATTEMPTS:-10}
      - LALA_ROOT_ADMIN_EMAIL=${LALA_ROOT_ADMIN_EMAIL:-user1-local@test.e2e}
    depends_on:
      mailpit:
        condition: service_healthy
