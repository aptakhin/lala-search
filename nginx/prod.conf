# Production nginx config for lala-web with Let's Encrypt TLS.
# Volume-mounted over the default config in docker-compose.prod.yml.

# HTTP — ACME challenge + redirect to HTTPS
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Health check (used by Docker healthcheck before certs exist)
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

# HTTPS — main site
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/lalasearch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lalasearch/privkey.pem;

    # Mozilla Intermediate TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Use relative URLs for auto-redirects (e.g. directory trailing slash).
    absolute_redirect off;

    # Serve static files with SSI (Server Side Includes) enabled
    location / {
        root /usr/share/nginx/html;
        ssi on;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SSI partials — accessible via <!--#include --> only, not direct HTTP
    location /includes/ {
        root /usr/share/nginx/html;
        internal;
    }

    # Proxy API requests to the backend
    location /api/ {
        proxy_pass http://lala-agent:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Magic link verification - proxied to backend (sets cookie + redirects)
    location /auth/verify/ {
        proxy_pass http://lala-agent:3000/auth/verify/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Invitation acceptance - proxied to backend (sets cookie + redirects)
    location /auth/invitations/ {
        proxy_pass http://lala-agent:3000/auth/invitations/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
